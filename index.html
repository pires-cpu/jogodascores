<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Simon Game</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- MENU -->
    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <h2>MENU</h2>

        <a href="index.html">🎮 Jogo</a>
        <a href="sobre.html">📖 Sobre</a>
        <a href="regras.html">🧠 Regras</a>

    </div>

    <!-- LAYOUT -->
    <div class="main-layout">

        <!-- ESQUERDA -->
        <div class="container">

            <h1>SIMON GAME</h1>

            <div class="score">
                Pontos:
                <span id="score">0</span>
            </div>

            <!-- TABULEIRO -->
            <div class="game">

                <div class="btn green" data-color="green">
                    <div class="fill"></div>
                </div>

                <div class="btn red" data-color="red">
                    <div class="fill"></div>
                </div>

                <div class="btn yellow" data-color="yellow">
                    <div class="fill"></div>
                </div>

                <div class="btn blue" data-color="blue">
                    <div class="fill"></div>
                </div>

                <div class="center-circle">
                    SIMON
                </div>

            </div>

            <!-- PLAYER PANEL -->
            <div class="player-panel">

                <h3>👤 Jogador Atual</h3>

                <div class="player-controls">

                    <input
                        type="text"
                        id="playerName"
                        placeholder="Digite seu nome..."
                        maxlength="15"
                    >

                    <button id="startBtn">
                        ▶ INICIAR
                    </button>

                    <button id="restartGame">
                        ↻ NOVA PARTIDA
                    </button>

                </div>

            </div>

        </div>

        <!-- RANKING -->
        <div class="ranking">

            <h2>🏆 Ranking</h2>

            <table>

                <thead>
                    <tr>
                        <th>Jogador</th>
                        <th>Pontos</th>
                    </tr>
                </thead>

                <tbody id="rankingBody"></tbody>

            </table>

            <button
                id="resetRanking"
                class="clear-ranking"
            >
                🗑 Limpar Ranking
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
